name: Metrics
on:
  # Запуск каждые 12 часов
  schedule: [{cron: "0 */12 * * *"}]
  # Возможность запустить скрипт вручную кнопкой
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bel-test-QA
          template: classic
          base: header, activity, community, repositories
          config_timezone: Europe/Moscow
          
          # Кастомная бирюзово-серая палитра
          palette: github
          colors: |
            title:#58AAC4
            text:#8b949e
            icon:#58AAC4
