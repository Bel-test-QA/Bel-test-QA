name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bel-test-QA
          template: classic
          filename: github-stats.svg
          base: header, activity, community, repositories
          config_timezone: Europe/Moscow
          config_twotone: yes
          config_twotone_color: "#58AAC4"

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bel-test-QA
          template: classic
          filename: github-langs.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes, percentage
          config_timezone: Europe/Moscow
          config_twotone: yes
          config_twotone_color: "#58AAC4"
