name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Первая карточка: Чистая статистика с рангом
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bel-test-QA
          template: classic
          filename: github-stats.svg
          # Оставляем только заголовок и репозитории, убираем лишние строчки активности
          base: header, repositories
          config_timezone: Europe/Moscow
          config_twotone: yes
          config_twotone_color: "#58AAC4"

      # Вторая карточка: Компактные языки (как в классическом стиле)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bel-test-QA
          template: classic
          filename: github-langs.svg
          base: ""
          plugin_languages: yes
          # Делаем компактный вид в одну полоску
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          # Пропускаем разметку, считаем только реальные языки программирования
          plugin_languages_ignored: html, css
          config_timezone: Europe/Moscow
          config_twotone: yes
          config_twotone_color: "#58AAC4"

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bel-test-QA
          template: classic
          # Имя файла для первой карточки (Проект 1)
          filename: project1-card.svg
          base: ""
          plugin_repositories: yes
          # Точное название твоего репозитория с автотестами API
          plugin_repositories_featured: api-automation-oort-depot
          config_twotone: yes
          config_twotone_color: "#58AAC4"

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Bel-test-QA
          template: classic
          # Имя файла для второй карточки (Проект 2)
          filename: project2-card.svg
          base: ""
          plugin_repositories: yes
          # Точное название твоего репозитория с UI тестами
          plugin_repositories_featured: ui-manual-qa-globbing
          config_twotone: yes
          config_twotone_color: "#58AAC4"
